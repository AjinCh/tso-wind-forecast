version: '3.8'

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: tennet-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=changeme123
      - TZ=Europe/Berlin
      - GENERIC_TIMEZONE=Europe/Berlin
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
    volumes:
      - n8n_data:/home/node/.n8n
      - ./:/workspace:ro
    networks:
      - tennet-network

  # PostgreSQL for forecast data storage
  postgres:
    image: postgres:15-alpine
    container_name: tennet-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=windforecast
      - POSTGRES_PASSWORD=windforecast123
      - POSTGRES_DB=windforecast
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tennet-network

volumes:
  n8n_data:
  postgres_data:

networks:
  tennet-network:
    driver: bridge
